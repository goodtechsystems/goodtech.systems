<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2aa198" />
      <stop offset="100%" stop-color="#268bd2" />
    </linearGradient>
    <linearGradient id="secondary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cb4b16" />
      <stop offset="100%" stop-color="#dc322f" />
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Connection Lines (Network Edges) -->
  <g stroke="#93a1a1" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="3,3">
    <!-- Heart outline connections, dipping to the center (50,52) -->
    <path d="M 30,35 L 50,52 L 70,35 L 80,55 L 50,85 L 20,55 Z" fill="none" />
    <!-- Internal cross connections -->
    <line x1="20" y1="55" x2="50" y2="52" />
    <line x1="80" y1="55" x2="50" y2="52" />
    <line x1="50" y1="85" x2="50" y2="52" />
  </g>

  <!-- Solid technical lines -->
  <g stroke="#2aa198" stroke-width="2" stroke-linecap="round" opacity="0.8">
    <!-- Solid dip representing the top lobes of the heart -->
    <path d="M 20,55 L 30,35 L 50,52 L 70,35 L 80,55" fill="none" />
    <!-- Solid tip representing bottom bounds -->
    <path d="M 20,55 L 50,85 L 80,55" fill="none" />
  </g>

  <!-- Data Nodes (Circles) -->
  <!-- Top Left Node -->
  <circle cx="30" cy="35" r="4.5" fill="#586e75" stroke="#fdf6e3" stroke-width="1.5" />
  <!-- Top Right Node -->
  <circle cx="70" cy="35" r="4.5" fill="#586e75" stroke="#fdf6e3" stroke-width="1.5" />
  
  <!-- Central Hub Node (Representing the Systems Core) -->
  <circle cx="50" cy="52" r="7.5" fill="url(#secondary-grad)" stroke="#fdf6e3" stroke-width="2.5" filter="url(#glow)" />
  
  <!-- Middle Left Node -->
  <circle cx="20" cy="55" r="4" fill="url(#primary-grad)" stroke="#fdf6e3" stroke-width="1.5" />
  <!-- Middle Right Node -->
  <circle cx="80" cy="55" r="4" fill="url(#primary-grad)" stroke="#fdf6e3" stroke-width="1.5" />
  <!-- Bottom Node (Handoff point / Tip of heart) -->
  <circle cx="50" cy="85" r="5.5" fill="url(#primary-grad)" stroke="#fdf6e3" stroke-width="2" />

  <!-- Data Pulse indicator ring -->
  <circle cx="50" cy="52" r="12" fill="none" stroke="#cb4b16" stroke-width="1" opacity="0.4" stroke-dasharray="2,4" />
</svg>
